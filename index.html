<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artykuły</title>
    <script type="module" src="/src/main.js"></script>
  </head>

  <body class="bg-slate-100 text-slate-900">
    <header class="p-4 bg-white shadow">
      <nav class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">Artykuły</h1>

        <div class="flex gap-3">
          <button id="addArticleBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            Dodaj artykuł
          </button>

          <button id="logoutBtn" class="hidden px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
            Wyloguj
          </button>
        </div>
      </nav>
    </header>

    <main class="max-w-5xl mx-auto p-4">
      <section id="articles" class="grid gap-4"></section>
    </main>

<dialog
  id="articleModal"
  class="fixed left-1/2 top-1/2 m-0 w-[90%] max-w-xl -translate-x-1/2 -translate-y-1/2 rounded-lg bg-white p-6 shadow-xl backdrop:bg-black/50"
>
  <form id="articleForm" class="grid gap-4">
    <h2 id="modalTitle" class="text-xl font-bold">Dodaj artykuł</h2>

    <label class="grid gap-1">
      <span class="font-medium">Tytuł</span>
      <input
        id="titleInput"
        class="rounded border border-slate-300 p-2 outline-none transition focus:border-blue-600"
        type="text"
        placeholder="Wpisz tytuł artykułu"
        required
      />
    </label>

    <label class="grid gap-1">
      <span class="font-medium">Podtytuł</span>
      <input
        id="subtitleInput"
        class="rounded border border-slate-300 p-2 outline-none transition focus:border-blue-600"
        type="text"
        placeholder="Wpisz podtytuł artykułu"
      />
    </label>

    <label class="grid gap-1">
      <span class="font-medium">Autor</span>
      <input
        id="authorInput"
        class="rounded border border-slate-300 p-2 outline-none transition focus:border-blue-600"
        type="text"
        placeholder="Wpisz autora artykułu"
        required
      />
    </label>

    <label class="grid gap-1">
      <span class="font-medium">Treść</span>
      <textarea
        id="contentInput"
        class="min-h-32 rounded border border-slate-300 p-2 outline-none transition focus:border-blue-600"
        placeholder="Wpisz treść artykułu"
        required
      ></textarea>
    </label>

    <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <button
        id="closeModalBtn"
        type="button"
        class="rounded bg-slate-300 px-4 py-2 transition hover:bg-slate-400"
      >
        Anuluj
      </button>

      <button
        type="submit"
        class="rounded bg-green-600 px-4 py-2 text-white transition hover:bg-green-700"
      >
        Zapisz
      </button>
    </div>
  </form>
</dialog>
  </body>
</html>
